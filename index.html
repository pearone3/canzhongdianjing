<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>喰种电竞 · 管家级陪玩</title>
    <script src="https://cdn.jsdelivr.net/npm/sortablejs@latest/Sortable.min.js"></script>
    <style>
        /* ===== 全局重置 & 基础 ===== */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: radial-gradient(circle at 20% 30%, #0a0f1e, #03050b);
            font-family: 'Segoe UI', system-ui, sans-serif;
            color: #eef;
            overflow-x: hidden;
            position: relative;
        }
        #particlesCanvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 0;
        }

        /* ===== 侧边栏（PC 固定左侧，手机转为顶部导航） ===== */
        .sidebar {
            position: fixed;
            left: 0;
            top: 0;
            width: 260px;
            height: 100%;
            background: rgba(15,20,30,0.95);
            backdrop-filter: blur(12px);
            border-right: 1px solid #ff8c42;
            transform: translateX(0);
            transition: transform 0.3s ease;
            z-index: 100;
            display: flex;
            flex-direction: column;
            padding: 20px 0;
        }
        .sidebar.collapsed { transform: translateX(-100%); }
        .sidebar-item {
            padding: 12px 24px;
            margin: 4px 12px;
            border-radius: 40px;
            cursor: pointer;
            transition: 0.2s;
            font-weight: bold;
        }
        .sidebar-item:hover, .sidebar-item.active { background: #ff6a00; color: white; box-shadow: 0 0 8px #ff6a00; }
        .sidebar-bottom { margin-top: auto; }

        .main-content {
            margin-left: 260px;
            transition: margin-left 0.3s ease;
            padding: 20px;
            position: relative;
            z-index: 2;
        }
        .main-content.expanded { margin-left: 0; }

        /* ===== 顶部栏 ===== */
        .topbar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 15px;
            background: rgba(30,36,59,0.6);
            backdrop-filter: blur(12px);
            border-radius: 80px;
            padding: 8px 20px;
            margin-bottom: 25px;
            border: 1px solid rgba(255,140,0,0.3);
        }
        .toggle-sidebar { background: none; border: none; font-size: 1.8rem; cursor: pointer; color: #ff8c42; }
        .title-area { font-size: 1rem; font-weight: bold; text-align: center; flex: 1; }
        .search-box {
            padding: 8px 16px;
            border-radius: 40px;
            border: 1px solid #ff8c42;
            background: #0b0e1a;
            color: white;
            width: 200px;
        }
        .btn {
            background: linear-gradient(135deg, #ff6a00, #ff3a00);
            border: none;
            padding: 6px 18px;
            border-radius: 40px;
            color: white;
            font-weight: bold;
            cursor: pointer;
            transition: 0.2s;
        }

        /* ===== 主页卡片 ===== */
        .hero-banner { width: 100%; margin-bottom: 30px; cursor: pointer; overflow: hidden; border-radius: 40px; }
        .hero-banner img { width: 100%; display: block; transition: 0.3s; }
        .hero-banner:hover img { transform: scale(1.01); }
        .notice-board {
            background: linear-gradient(135deg, #2a2e48, #1e243b);
            border-radius: 32px;
            padding: 20px;
            margin-bottom: 30px;
            border-left: 8px solid #ff8c42;
            box-shadow: 0 8px 20px rgba(0,0,0,0.3);
        }
        .notice-board h2 { color: #ffd966; margin-bottom: 12px; }
        .special-price-section {
            background: rgba(20,24,45,0.7);
            backdrop-filter: blur(8px);
            border-radius: 48px;
            padding: 20px;
            margin-bottom: 30px;
        }
        .game-tabs {
            display: flex;
            gap: 20px;
            justify-content: center;
            margin-bottom: 25px;
            flex-wrap: wrap;
        }
        .game-tab-btn {
            background: #2a2e48;
            border: none;
            padding: 12px 28px;
            border-radius: 60px;
            font-size: 1.2rem;
            font-weight: bold;
            cursor: pointer;
            transition: 0.2s;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .game-tab-btn.active { background: #ff6a00; color: white; box-shadow: 0 0 12px #ff6a00; }
        .game-banner { width: 100%; margin-bottom: 20px; border-radius: 30px; overflow: hidden; }
        .game-banner img { width: 100%; height: auto; display: block; }
        .special-offers-grid {
            display: flex;
            flex-wrap: wrap;
            gap: 20px;
            justify-content: center;
            margin-top: 20px;
        }
        .special-card {
            background: #1e243b;
            border-radius: 24px;
            padding: 16px;
            width: 240px;
            text-align: center;
            border: 1px solid #ff8c42;
            transition: 0.2s;
        }
        .special-card:hover { transform: translateY(-4px); box-shadow: 0 8px 20px rgba(255,100,0,0.3); }
        .special-card h3 { color: #ffd966; margin-bottom: 8px; }
        .special-card .price { color: #ffb347; font-size: 1.3rem; margin: 8px 0; font-weight: bold; }

        /* ===== 选陪大厅 ===== */
        .games-grid {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 30px;
            margin-bottom: 40px;
        }
        .game-card {
            background: rgba(20,24,40,0.6);
            backdrop-filter: blur(12px);
            border-radius: 56px;
            padding: 30px 25px;
            width: 260px;
            text-align: center;
            cursor: pointer;
            transition: 0.3s;
            border: 1px solid rgba(255,100,0,0.3);
        }
        .game-card:hover { transform: translateY(-12px); border-color: #ff8c42; box-shadow: 0 25px 40px rgba(255,100,0,0.3); }
        .players-list { display: flex; flex-direction: column; gap: 20px; }
        .player-card {
            background: linear-gradient(135deg, #151e2c, #1a2335);
            border-radius: 40px;
            display: flex;
            flex-direction: row;
            overflow: hidden;
            border: 1px solid rgba(255,140,0,0.4);
            transition: 0.2s;
        }
        .player-card:hover { transform: scale(1.01); border-color: #ffaa55; }
        .player-icon { width: 100px; display: flex; align-items: center; justify-content: center; font-size: 3rem; background: rgba(0,0,0,0.3); }
        .info { flex: 1; padding: 18px; }
        .nickname { font-size: 1.4rem; font-weight: bold; color: #ffdfa5; }
        .prices { display: flex; flex-wrap: wrap; gap: 12px; margin: 8px 0; }
        .price-tag { background: #2a3452; padding: 4px 12px; border-radius: 30px; font-size: 0.8rem; }
        .filter-bar {
            background: rgba(19,23,43,0.8);
            backdrop-filter: blur(12px);
            padding: 15px 25px;
            border-radius: 80px;
            margin-bottom: 30px;
            display: flex;
            flex-wrap: wrap;
            gap: 15px;
        }

        /* ===== 委托布告栏 ===== */
        .tasks-direct {
            display: flex;
            flex-wrap: wrap;
            gap: 20px;
            justify-content: center;
            margin-top: 20px;
        }
        .task-card-direct {
            background: #fdf8e7;
            color: #3e2a1f;
            width: 280px;
            padding: 16px;
            border-radius: 24px;
            box-shadow: 0 8px 16px rgba(0,0,0,0.2);
            border: 1px solid #d4b48c;
        }

        /* ===== 店长模式 ===== */
        .admin-container {
            background: rgba(20,24,45,0.8);
            border-radius: 48px;
            padding: 24px;
        }
        .admin-tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }
        .form-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
            gap: 15px;
            margin-bottom: 25px;
        }
        .form-grid input, .form-grid select, .form-grid textarea { width: 100%; padding: 8px; background: #0b0e1a; border: 1px solid #ff8c42; color: white; border-radius: 28px; }
        .table-wrapper { overflow-x: auto; margin-top: 20px; }
        table { width: 100%; min-width: 600px; border-collapse: collapse; background: rgba(0,0,0,0.3); border-radius: 20px; }
        th, td { padding: 12px 8px; text-align: left; border-bottom: 1px solid #2a2e48; }
        th { color: #ffb347; background: #13172b; }

        /* ===== 响应式样式：手机端 ===== */
        @media (max-width: 768px) {
            /* 侧边栏变成顶部隐藏菜单 */
            .sidebar {
                width: 100%;
                height: auto;
                position: fixed;
                top: 0;
                left: 0;
                transform: translateY(-100%);
                border-right: none;
                border-bottom: 1px solid #ff8c42;
                padding: 10px 0;
                flex-direction: row;
                flex-wrap: wrap;
                justify-content: center;
                transition: transform 0.3s ease;
                background: rgba(15,20,30,0.98);
            }
            .sidebar.open {
                transform: translateY(0);
            }
            .sidebar-item {
                padding: 8px 16px;
                margin: 2px 6px;
                font-size: 0.9rem;
            }
            .sidebar-bottom { margin-top: 0; }

            .main-content {
                margin-left: 0;
                padding: 10px;
            }
            .main-content.expanded { margin-left: 0; }

            /* 顶部栏适配 */
            .topbar {
                flex-direction: column;
                align-items: stretch;
                gap: 10px;
                padding: 10px 16px;
                border-radius: 40px;
            }
            .title-area { font-size: 0.9rem; }
            .search-box { width: 100%; }
            .toggle-sidebar { align-self: flex-start; }

            /* 游戏卡片、特殊卡片、陪玩卡片 */
            .game-card { width: 100%; max-width: 320px; }
            .player-card { flex-direction: column; }
            .player-icon { width: 100%; padding: 20px 0; }
            .special-card { width: 100%; max-width: 300px; }
            .game-tabs { gap: 10px; }
            .game-tab-btn { padding: 8px 16px; font-size: 1rem; }

            /* 筛选器垂直排列 */
            .filter-bar { flex-direction: column; align-items: stretch; }

            /* 店长模式表单单列 */
            .form-grid { grid-template-columns: 1fr; }
            .admin-container { padding: 16px; }
            .admin-tabs { gap: 6px; }
            .admin-tabs .btn { padding: 6px 12px; font-size: 0.85rem; }

            /* 表格横向滚动 */
            .table-wrapper { overflow-x: auto; }
            table { min-width: 500px; }

            /* 主页横幅 */
            .hero-banner { border-radius: 20px; }
            .notice-board { padding: 16px; }
            .special-price-section { padding: 16px; border-radius: 32px; }

            /* 委托卡片 */
            .task-card-direct { width: 100%; max-width: 320px; }
        }
    </style>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
<canvas id="particlesCanvas"></canvas>
<div class="sidebar" id="sidebar">
    <div class="sidebar-item" data-page="home">🏠 主页</div>
    <div class="sidebar-item" data-page="peiwang">🎮 选陪大厅</div>
    <div class="sidebar-item" data-page="weituo">📜 委托布告栏</div>
    <div class="sidebar-item sidebar-bottom" data-page="admin">👑 店长模式</div>
</div>
<div class="main-content" id="mainContent">
    <div class="topbar">
        <button class="toggle-sidebar" id="toggleSidebarBtn">☰</button>
        <div class="title-area">🍽️ 喰种电竞 · 励志成为第一家管家级的陪玩店</div>
        <input type="text" id="globalSearch" class="search-box" placeholder="搜索陪玩...">
        <button id="shopOwnerBtn" class="btn">👑 店长模式</button>
    </div>
    <div id="pageContainer"></div>
</div>

<script>
    (async function () {
        // 粒子效果（省略，保持原样）
        const canvas = document.getElementById('particlesCanvas');
        if (canvas) {
            const ctx = canvas.getContext('2d');
            let width = window.innerWidth, height = window.innerHeight;
            let particles = [];
            function resizeCanvas() { width = window.innerWidth; height = window.innerHeight; canvas.width = width; canvas.height = height; }
            function initParticles() {
                particles = [];
                for (let i = 0; i < 120; i++) {
                    particles.push({
                        x: Math.random() * width, y: Math.random() * height,
                        radius: Math.random() * 2.5 + 1,
                        vx: (Math.random() - 0.5) * 0.6, vy: (Math.random() - 0.5) * 0.6,
                        color: `rgba(255, 140, 0, ${Math.random() * 0.5 + 0.2})`
                    });
                }
            }
            function drawParticles() {
                if (!ctx) return;
                ctx.clearRect(0, 0, width, height);
                for (let p of particles) {
                    ctx.beginPath(); ctx.arc(p.x, p.y, p.radius, 0, Math.PI * 2);
                    ctx.fillStyle = p.color; ctx.fill();
                    p.x += p.vx; p.y += p.vy;
                    if (p.x < 0) p.x = width; if (p.x > width) p.x = 0;
                    if (p.y < 0) p.y = height; if (p.y > height) p.y = 0;
                }
                requestAnimationFrame(drawParticles);
            }
            window.addEventListener('resize', () => { resizeCanvas(); initParticles(); });
            resizeCanvas(); initParticles(); drawParticles();
        }

        // Supabase 配置
        const SUPABASE_URL = 'https://zdsdipaqfxchpinifxtb.supabase.co';
        const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inpkc2RpcGFxZnhjaHBpbmlmeHRiIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY5NDgwMDgsImV4cCI6MjA5MjUyNDAwOH0.HZ6MxcZqrC-zo9-d-rdjPmcHgpnwF2tphRWm-zPvwFs';
        const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        // 全局变量
        let games = [], players = [], tasks = [], specialOffers = [], announcement = { content: '欢迎来到喰种电竞！首单半价，冠军陪玩等你来！' };
        let currentPage = 'home';
        let searchKeyword = '';
        let currentGameId = null;
        let currentSpecialGame = 'valorant';
        let editingPlayerId = null, editingTaskId = null, editingSpecialId = null;
        let adminActiveTab = 'peiwangAdmin';

        // 数据加载
        async function loadGames() { const { data, error } = await supabase.from('games').select('*'); if (!error && data) games = data; }
        async function loadPlayers() { const { data, error } = await supabase.from('players').select('*'); if (!error && data) players = data; }
        async function loadTasks() { const { data, error } = await supabase.from('tasks').select('*').eq('is_active', true); if (!error && data) tasks = data; }
        async function loadSpecialOffers() { const { data, error } = await supabase.from('special_offers').select('*').eq('is_active', true); if (!error && data) specialOffers = data; }
        async function loadAnnouncement() { const { data, error } = await supabase.from('announcement').select('content').eq('id', 1).single(); if (data) announcement = data; }

        // 主页渲染（无修改）
        function renderHome() {
            const container = document.getElementById('pageContainer');
            container.innerHTML = `
                <div class="hero-banner" id="kookBanner">
                    <img src="images/kook-banner.jpg" alt="KOOK宣传图">
                </div>
                <div class="notice-board">
                    <h2>📢 喰种公告</h2>
                    <p>${announcement.content}</p>
                </div>
                <div class="special-price-section">
                    <div class="game-tabs">
                        <button class="game-tab-btn ${currentSpecialGame === 'valorant' ? 'active' : ''}" data-game="valorant">🎯 无畏契约</button>
                        <button class="game-tab-btn ${currentSpecialGame === 'darkdarker' ? 'active' : ''}" data-game="darkdarker">⚔️ Dark and Darker</button>
                        <button class="game-tab-btn ${currentSpecialGame === 'deltaforce' ? 'active' : ''}" data-game="deltaforce">🔫 三角洲行动</button>
                    </div>
                    <div id="specialGameBanner" class="game-banner"></div>
                    <div id="specialOffersList" class="special-offers-grid"></div>
                </div>
            `;
            document.getElementById('kookBanner').onclick = () => window.open('https://kook.vip/SABJbD', '_blank');
            document.querySelectorAll('.game-tab-btn').forEach(btn => {
                btn.onclick = () => {
                    currentSpecialGame = btn.dataset.game;
                    renderSpecialContent();
                    document.querySelectorAll('.game-tab-btn').forEach(b => b.classList.remove('active'));
                    btn.classList.add('active');
                };
            });
            renderSpecialContent();
        }

        function renderSpecialContent() {
            const bannerUrls = {
                valorant: 'images/valorant.jpg',
                darkdarker: 'images/darkdarker.jpg',
                deltaforce: 'images/deltaforce.jpg'
            };
            const bannerDiv = document.getElementById('specialGameBanner');
            if (bannerDiv) bannerDiv.innerHTML = `<img src="${bannerUrls[currentSpecialGame]}" alt="${currentSpecialGame}宣传图">`;
            const offers = specialOffers.filter(o => o.game_id === currentSpecialGame);
            const container = document.getElementById('specialOffersList');
            if (!container) return;
            if (offers.length === 0) {
                container.innerHTML = '<div style="text-align:center; padding:20px;">暂无特殊单，店长模式中添加</div>';
                return;
            }
            container.innerHTML = offers.map(o => `
                <div class="special-card">
                    <h3>✨ ${escapeHtml(o.title)}</h3>
                    <div class="price">💰 ${escapeHtml(o.price_text)}</div>
                    <p>${escapeHtml(o.description || '')}</p>
                </div>
            `).join('');
        }

        // 选陪大厅（无修改）
        function renderPeiwangHall() {
            const container = document.getElementById('pageContainer');
            container.innerHTML = `
                <div id="gamesGrid" class="games-grid">加载游戏中...</div>
                <div id="detailPanel">
                    <div class="filter-bar" id="filterBar"></div>
                    <div id="playersListContainer" class="players-list"></div>
                </div>
            `;
            renderGamesGrid();
        }
        function renderGamesGrid() {
            const grid = document.getElementById('gamesGrid');
            if (!games.length) { grid.innerHTML = '<div>暂无游戏，请店长模式添加。</div>'; return; }
            grid.innerHTML = '';
            games.forEach(game => {
                const card = document.createElement('div');
                card.className = 'game-card';
                card.innerHTML = `<div style="font-size:3rem;">${game.emoji || '🎮'}</div><h3>${game.name}</h3><p>${game.description || ''}</p>`;
                card.onclick = () => { currentGameId = game.id; renderFilterBar(); renderPlayersList(); };
                grid.appendChild(card);
            });
        }
        function renderFilterBar() {
            const container = document.getElementById('filterBar');
            if (!currentGameId) { container.innerHTML = ''; return; }
            container.innerHTML = `<div class="filter-group"><label>暂无高级筛选</label></div><button class="btn" id="resetFiltersBtn">重置筛选</button>`;
            document.getElementById('resetFiltersBtn').onclick = () => renderPlayersList();
        }
        function renderPlayersList() {
            const container = document.getElementById('playersListContainer');
            if (!currentGameId) { container.innerHTML = ''; return; }
            let filtered = players.filter(p => p.game_id === currentGameId);
            if (searchKeyword) {
                filtered = filtered.filter(p => p.nickname.includes(searchKeyword) || (p.skills && p.skills.includes(searchKeyword)));
            }
            if (!filtered.length) { container.innerHTML = '<div>😭 没有符合条件的陪玩</div>'; return; }
            container.innerHTML = '';
            filtered.forEach(p => {
                const typeText = { tech: '技术陪', entertain: '娱乐陪', gourmet: '喰种' }[p.type];
                const icon = typeText === '技术陪' ? '🎮' : (typeText === '娱乐陪' ? '🎤' : '🍖');
                let priceHtml = '';
                if (p.game_id === 'deltaforce') {
                    priceHtml = `<div class="prices"><span class="price-tag">绝密: ${p.price_secret ?? '-'}元/小时</span><span class="price-tag">机密: ${p.price_classified ?? '-'}元/小时</span><span class="price-tag">娱乐: ${p.price_entertain_delta ?? '-'}元/小时</span></div>`;
                } else {
                    priceHtml = `<div class="prices"><span class="price-tag">技术单: ${p.tech_price ?? '-'}元/小时</span><span class="price-tag">娱乐单: ${p.entertain_price ?? '-'}元/小时</span></div>`;
                }
                const honorsHtml = p.honors ? `<div class="honor-list">${p.honors.split(',').map(h => `<span class="price-tag">🏅 ${h}</span>`).join('')}</div>` : '';
                const skillsHtml = p.skills ? `<div class="skill-list">擅长: ${p.skills.split(',').map(s => `<span class="price-tag">🎯 ${s}</span>`).join('')}</div>` : '';
                const card = document.createElement('div');
                card.className = 'player-card';
                card.innerHTML = `
                    <div class="player-icon">${icon}</div>
                    <div class="info">
                        <div class="nickname">${escapeHtml(p.nickname)} <span class="type-badge">${typeText}</span></div>
                        <div>🏆 ${escapeHtml(p.rank || '暂无')}</div>
                        ${priceHtml}
                        ${honorsHtml}
                        ${skillsHtml}
                    </div>
                `;
                container.appendChild(card);
            });
        }

        // 委托布告栏（无修改）
        function renderWeituo() {
            const container = document.getElementById('pageContainer');
            container.innerHTML = `<div class="tasks-direct" id="tasksDirectContainer"></div>`;
            renderTasksDirect();
        }
        function renderTasksDirect() {
            const container = document.getElementById('tasksDirectContainer');
            if (!container) return;
            container.innerHTML = '';
            if (tasks.length === 0) {
                container.innerHTML = '<div style="text-align:center; padding:40px;">暂无委托任务</div>';
                return;
            }
            tasks.forEach(task => {
                const card = document.createElement('div');
                card.className = 'task-card-direct';
                card.innerHTML = `
                    <h3>💰 ${escapeHtml(task.bounty)}</h3>
                    <p><strong>内容：</strong>${escapeHtml(task.content)}</p>
                    <p><strong>额外：</strong>${escapeHtml(task.extra || '无')}</p>
                    <p><strong>时间：</strong>${escapeHtml(task.time_range || '未定')}</p>
                `;
                container.appendChild(card);
            });
        }

        // 店长模式（无修改，但内部表单已适配响应式）
        function renderAdminPage() {
            const container = document.getElementById('pageContainer');
            container.innerHTML = `
                <div class="admin-container">
                    <div class="admin-tabs">
                        <button class="btn ${adminActiveTab === 'peiwangAdmin' ? 'active' : ''}" data-admin-tab="peiwangAdmin">陪玩管理</button>
                        <button class="btn ${adminActiveTab === 'tasksAdmin' ? 'active' : ''}" data-admin-tab="tasksAdmin">委托管理</button>
                        <button class="btn ${adminActiveTab === 'specialAdmin' ? 'active' : ''}" data-admin-tab="specialAdmin">特殊单管理</button>
                        <button class="btn ${adminActiveTab === 'systemAdmin' ? 'active' : ''}" data-admin-tab="systemAdmin">系统设置</button>
                    </div>
                    <div id="adminDynamicContent"></div>
                </div>
            `;
            document.querySelectorAll('[data-admin-tab]').forEach(btn => {
                btn.onclick = () => {
                    adminActiveTab = btn.dataset.adminTab;
                    renderAdminPage();
                };
            });
            renderAdminContent();
        }
        function renderAdminContent() {
            const dynamicDiv = document.getElementById('adminDynamicContent');
            if (!dynamicDiv) return;
            if (adminActiveTab === 'peiwangAdmin') {
                dynamicDiv.innerHTML = `
                    <div class="form-grid">
                        <input type="text" id="pNickname" placeholder="昵称">
                        <select id="pGameSelect">${games.map(g => `<option value="${g.id}">${g.name}</option>`).join('')}</select>
                        <select id="pType"><option value="tech">技术陪</option><option value="entertain">娱乐陪</option><option value="gourmet">喰种</option></select>
                        <input type="text" id="pRank" placeholder="段位">
                        <input type="number" id="pTechPrice" placeholder="技术单价">
                        <input type="number" id="pEntertainPrice" placeholder="娱乐单价">
                        <input type="number" id="pSecret" placeholder="绝密单价(三角洲)">
                        <input type="number" id="pClassified" placeholder="机密单价(三角洲)">
                        <input type="number" id="pDeltaEnter" placeholder="三角洲娱乐价">
                        <input type="text" id="pHonors" placeholder="荣誉(逗号)">
                        <input type="text" id="pSkills" placeholder="擅长(逗号)">
                        <button id="addUpdatePlayerBtn" class="btn">添加/更新</button>
                    </div>
                    <div class="table-wrapper">
                        <table id="playersAdminTable">
                            <thead><tr><th>昵称</th><th>游戏</th><th>类型</th><th>段位</th><th>价格详情</th><th>操作</th></tr></thead>
                            <tbody></tbody>
                        </table>
                    </div>
                `;
                refreshPlayersAdminTable();
                document.getElementById('addUpdatePlayerBtn').onclick = addUpdatePlayer;
            } else if (adminActiveTab === 'tasksAdmin') {
                dynamicDiv.innerHTML = `
                    <div class="form-grid">
                        <input type="text" id="taskBounty" placeholder="赏金">
                        <input type="text" id="taskContent" placeholder="委托内容">
                        <input type="text" id="taskExtra" placeholder="额外需求">
                        <input type="text" id="taskTimeRange" placeholder="时间范围">
                        <input type="text" id="taskHiddenCode" placeholder="号码牌(隐藏)">
                        <button id="addTaskBtn" class="btn">添加委托</button>
                    </div>
                    <div id="tasksAdminList"></div>
                `;
                renderTasksAdminList();
                document.getElementById('addTaskBtn').onclick = addTask;
            } else if (adminActiveTab === 'specialAdmin') {
                dynamicDiv.innerHTML = `
                    <div class="form-grid">
                        <select id="specialGameSelect">${games.map(g => `<option value="${g.id}">${g.name}</option>`).join('')}</select>
                        <input type="text" id="specialTitle" placeholder="特殊单名称 (例: 趣味整活单)">
                        <input type="text" id="specialPriceText" placeholder="价格文本 (例: 100元/局)">
                        <input type="text" id="specialDesc" placeholder="描述 (可选)">
                        <button id="addUpdateSpecialBtn" class="btn">添加/更新</button>
                    </div>
                    <div id="specialOffersAdminList"></div>
                `;
                renderSpecialOffersAdminList();
                document.getElementById('addUpdateSpecialBtn').onclick = addUpdateSpecial;
            } else if (adminActiveTab === 'systemAdmin') {
                dynamicDiv.innerHTML = `
                    <div class="form-grid">
                        <textarea id="announcementContent" rows="3" style="width:100%;">${announcement.content}</textarea>
                        <button id="saveAnnouncementBtn" class="btn">保存公告</button>
                    </div>
                `;
                document.getElementById('saveAnnouncementBtn').onclick = async () => {
                    const newContent = document.getElementById('announcementContent').value;
                    await supabase.from('announcement').update({ content: newContent }).eq('id', 1);
                    announcement.content = newContent;
                    alert('公告已保存');
                    if (currentPage === 'home') renderHome();
                };
            }
        }

        // 陪玩管理函数（无修改）
        async function refreshPlayersAdminTable() {
            const tbody = document.querySelector('#playersAdminTable tbody');
            if (!tbody) return;
            tbody.innerHTML = '';
            players.forEach(p => {
                const row = tbody.insertRow();
                row.insertCell(0).innerText = p.nickname;
                row.insertCell(1).innerText = p.game_id;
                row.insertCell(2).innerText = p.type;
                row.insertCell(3).innerText = p.rank;
                let priceStr = '';
                if (p.game_id === 'deltaforce') {
                    priceStr = `绝密:${p.price_secret} 机密:${p.price_classified} 娱乐:${p.price_entertain_delta}`;
                } else {
                    priceStr = `技:${p.tech_price} 娱:${p.entertain_price}`;
                }
                row.insertCell(4).innerText = priceStr;
                const actions = row.insertCell(5);
                actions.innerHTML = `<button onclick="editPlayer('${p.id}')">编辑</button><button onclick="deletePlayer('${p.id}')">删除</button>`;
            });
        }
        window.editPlayer = (id) => {
            const p = players.find(p => p.id == id);
            if (p) {
                document.getElementById('pNickname').value = p.nickname;
                document.getElementById('pGameSelect').value = p.game_id;
                document.getElementById('pType').value = p.type;
                document.getElementById('pRank').value = p.rank;
                document.getElementById('pTechPrice').value = p.tech_price || '';
                document.getElementById('pEntertainPrice').value = p.entertain_price || '';
                document.getElementById('pSecret').value = p.price_secret || '';
                document.getElementById('pClassified').value = p.price_classified || '';
                document.getElementById('pDeltaEnter').value = p.price_entertain_delta || '';
                document.getElementById('pHonors').value = p.honors || '';
                document.getElementById('pSkills').value = p.skills || '';
                editingPlayerId = id;
            }
        };
        window.deletePlayer = async (id) => {
            if (confirm('删除陪玩？')) {
                await supabase.from('players').delete().eq('id', id);
                await loadPlayers();
                if (currentPage === 'admin' && adminActiveTab === 'peiwangAdmin') refreshPlayersAdminTable();
                if (currentPage === 'peiwang' && currentGameId) renderPlayersList();
                if (currentPage === 'home') renderHome();
            }
        };
        async function addUpdatePlayer() {
            const nickname = document.getElementById('pNickname').value;
            const game_id = document.getElementById('pGameSelect').value;
            const type = document.getElementById('pType').value;
            const rank = document.getElementById('pRank').value;
            const tech_price = parseInt(document.getElementById('pTechPrice').value) || null;
            const entertain_price = parseInt(document.getElementById('pEntertainPrice').value) || null;
            const price_secret = parseInt(document.getElementById('pSecret').value) || null;
            const price_classified = parseInt(document.getElementById('pClassified').value) || null;
            const price_entertain_delta = parseInt(document.getElementById('pDeltaEnter').value) || null;
            const honors = document.getElementById('pHonors').value;
            const skills = document.getElementById('pSkills').value;
            const playerData = { nickname, game_id, type, rank, tech_price, entertain_price, price_secret, price_classified, price_entertain_delta, honors, skills };
            if (editingPlayerId) {
                await supabase.from('players').update(playerData).eq('id', editingPlayerId);
                editingPlayerId = null;
            } else {
                await supabase.from('players').insert([playerData]);
            }
            await loadPlayers();
            if (currentPage === 'admin' && adminActiveTab === 'peiwangAdmin') refreshPlayersAdminTable();
            if (currentPage === 'peiwang' && currentGameId) renderPlayersList();
            if (currentPage === 'home') renderHome();
            document.querySelectorAll('#adminDynamicContent input').forEach(i => i.value = '');
        }

        // 委托管理函数（无修改）
        async function renderTasksAdminList() {
            const container = document.getElementById('tasksAdminList');
            if (!container) return;
            container.innerHTML = '';
            tasks.forEach(t => {
                const div = document.createElement('div');
                div.style.background = '#2a2e48';
                div.style.padding = '12px';
                div.style.marginBottom = '10px';
                div.style.borderRadius = '20px';
                div.innerHTML = `
                    <strong>💰 ${escapeHtml(t.bounty)}</strong> - ${escapeHtml(t.content)}<br>
                    额外: ${escapeHtml(t.extra || '无')} | 时间: ${escapeHtml(t.time_range || '未定')} | 号码牌: ${escapeHtml(t.hidden_code || '无')}
                    <button onclick="editTask(${t.id})">编辑</button>
                    <button onclick="deleteTask(${t.id})">删除</button>
                `;
                container.appendChild(div);
            });
        }
        window.editTask = (id) => {
            const t = tasks.find(t => t.id === id);
            if (t) {
                document.getElementById('taskBounty').value = t.bounty;
                document.getElementById('taskContent').value = t.content;
                document.getElementById('taskExtra').value = t.extra || '';
                document.getElementById('taskTimeRange').value = t.time_range || '';
                document.getElementById('taskHiddenCode').value = t.hidden_code || '';
                editingTaskId = id;
            }
        };
        window.deleteTask = async (id) => {
            if (confirm('删除委托？')) {
                await supabase.from('tasks').update({ is_active: false }).eq('id', id);
                await loadTasks();
                if (currentPage === 'admin' && adminActiveTab === 'tasksAdmin') renderTasksAdminList();
                if (currentPage === 'weituo') renderTasksDirect();
            }
        };
        async function addTask() {
            const bounty = document.getElementById('taskBounty').value;
            const content = document.getElementById('taskContent').value;
            const extra = document.getElementById('taskExtra').value;
            const time_range = document.getElementById('taskTimeRange').value;
            const hidden_code = document.getElementById('taskHiddenCode').value;
            if (!bounty || !content) return alert('赏金和内容不能为空');
            const task = { bounty, content, extra, time_range, hidden_code, is_active: true };
            if (editingTaskId) {
                await supabase.from('tasks').update(task).eq('id', editingTaskId);
                editingTaskId = null;
            } else {
                await supabase.from('tasks').insert([task]);
            }
            await loadTasks();
            if (currentPage === 'admin' && adminActiveTab === 'tasksAdmin') renderTasksAdminList();
            if (currentPage === 'weituo') renderTasksDirect();
        }

        // 特殊单管理（无修改）
        async function renderSpecialOffersAdminList() {
            const container = document.getElementById('specialOffersAdminList');
            if (!container) return;
            const { data, error } = await supabase.from('special_offers').select('*').order('sort_order', { ascending: true });
            if (error) { console.error(error); container.innerHTML = '<div>加载失败</div>'; return; }
            const offers = data || [];
            container.innerHTML = '';
            offers.forEach(o => {
                const div = document.createElement('div');
                div.style.background = '#2a2e48';
                div.style.padding = '12px';
                div.style.marginBottom = '10px';
                div.style.borderRadius = '20px';
                div.innerHTML = `
                    <strong>${escapeHtml(o.title)}</strong> - ${escapeHtml(o.price_text)}<br>
                    游戏: ${games.find(g => g.id === o.game_id)?.name || o.game_id}<br>
                    描述: ${escapeHtml(o.description || '无')}
                    <button onclick="editSpecial(${o.id})">编辑</button>
                    <button onclick="deleteSpecial(${o.id})">删除</button>
                `;
                container.appendChild(div);
            });
        }
        window.editSpecial = async (id) => {
            const { data, error } = await supabase.from('special_offers').select('*').eq('id', id).single();
            if (data) {
                document.getElementById('specialGameSelect').value = data.game_id;
                document.getElementById('specialTitle').value = data.title;
                document.getElementById('specialPriceText').value = data.price_text;
                document.getElementById('specialDesc').value = data.description || '';
                editingSpecialId = id;
            } else {
                alert('编辑失败');
            }
        };
        window.deleteSpecial = async (id) => {
            if (confirm('删除特殊单？')) {
                await supabase.from('special_offers').update({ is_active: false }).eq('id', id);
                await loadSpecialOffers();
                if (currentPage === 'home') renderHome();
                renderSpecialOffersAdminList();
            }
        };
        async function addUpdateSpecial() {
            const game_id = document.getElementById('specialGameSelect').value;
            const title = document.getElementById('specialTitle').value.trim();
            const price_text = document.getElementById('specialPriceText').value.trim();
            const description = document.getElementById('specialDesc').value.trim();
            if (!title || !price_text) return alert('名称和价格不能为空');
            const data = { game_id, title, price_text, description, is_active: true };
            if (editingSpecialId) {
                await supabase.from('special_offers').update(data).eq('id', editingSpecialId);
                editingSpecialId = null;
            } else {
                await supabase.from('special_offers').insert([data]);
            }
            await loadSpecialOffers();
            if (currentPage === 'home') renderHome();
            renderSpecialOffersAdminList();
            document.getElementById('specialTitle').value = '';
            document.getElementById('specialPriceText').value = '';
            document.getElementById('specialDesc').value = '';
        }

        // 页面路由与事件绑定
        function switchPage(page) {
            currentPage = page;
            document.querySelectorAll('.sidebar-item').forEach(item => {
                if (item.dataset.page === page) item.classList.add('active');
                else item.classList.remove('active');
            });
            if (page === 'home') renderHome();
            else if (page === 'peiwang') renderPeiwangHall();
            else if (page === 'weituo') renderWeituo();
            else if (page === 'admin') {
                const pwd = prompt('请输入店长密码：');
                if (pwd === 'admin123') {
                    renderAdminPage();
                } else {
                    alert('密码错误');
                    switchPage('home');
                }
            }
        }

        document.getElementById('globalSearch').addEventListener('input', (e) => {
            searchKeyword = e.target.value;
            if (currentPage === 'peiwang' && currentGameId) renderPlayersList();
        });
        document.getElementById('toggleSidebarBtn').onclick = () => {
            document.getElementById('sidebar').classList.toggle('collapsed');
            document.getElementById('mainContent').classList.toggle('expanded');
        };
        document.getElementById('shopOwnerBtn').onclick = () => switchPage('admin');
        document.querySelectorAll('.sidebar-item').forEach(item => {
            item.onclick = () => switchPage(item.dataset.page);
        });

        function escapeHtml(str) { return String(str).replace(/[&<>]/g, m => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;' }[m])); }

        await loadGames();
        await loadPlayers();
        await loadTasks();
        await loadSpecialOffers();
        await loadAnnouncement();
        switchPage('home');
    })();
</script>
</body>
</html>
