<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>喰种电竞 · 店长全能系统</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: radial-gradient(circle at 20% 30%, #0a0f1e, #03050b);
            font-family: 'Poppins', 'Segoe UI', system-ui, sans-serif;
            color: #eef;
            padding: 20px;
            min-height: 100vh;
            position: relative;
            overflow-x: hidden;
        }
        #particlesCanvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 0;
        }
        .container { max-width: 1400px; margin: 0 auto; position: relative; z-index: 2; }
        .toolbar {
            backdrop-filter: blur(12px);
            background: rgba(30, 36, 59, 0.6);
            border-radius: 80px;
            padding: 12px 24px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 12px;
            margin-bottom: 30px;
            border: 1px solid rgba(255, 140, 0, 0.3);
        }
        .btn {
            background: linear-gradient(135deg, #ff6a00, #ff3a00);
            border: none;
            padding: 8px 22px;
            border-radius: 40px;
            color: white;
            font-weight: bold;
            cursor: pointer;
            transition: 0.2s;
        }
        .btn-outline { background: transparent; border: 1px solid #ff8c42; }
        .btn:hover { transform: translateY(-2px); filter: brightness(1.05); }
        .admin-panel {
            backdrop-filter: blur(16px);
            background: rgba(20, 24, 45, 0.85);
            border-radius: 32px;
            padding: 24px;
            margin-bottom: 30px;
            border: 1px solid rgba(255, 140, 0, 0.4);
            display: none;
        }
        .admin-tabs { display: flex; gap: 15px; margin-bottom: 25px; flex-wrap: wrap; }
        .admin-tab {
            background: rgba(42, 46, 72, 0.7);
            padding: 10px 24px;
            border-radius: 40px;
            cursor: pointer;
        }
        .admin-tab.active { background: #ff6a00; color: white; box-shadow: 0 0 12px #ff6a00; }
        .tab-content { display: none; }
        .tab-content.active { display: block; }
        .form-row { display: flex; flex-wrap: wrap; gap: 15px; margin-bottom: 20px; align-items: flex-end; }
        .form-group { flex: 1; min-width: 140px; }
        label { font-size: 0.75rem; color: #ccd; display: block; margin-bottom: 5px; }
        input, select, textarea {
            background: #0b0e1a;
            border: 1px solid #ff8c42;
            color: white;
            padding: 10px 14px;
            border-radius: 28px;
            width: 100%;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            background: rgba(0,0,0,0.3);
            border-radius: 20px;
            overflow: hidden;
        }
        th, td { padding: 12px 10px; text-align: left; border-bottom: 1px solid #2a2e48; }
        th { color: #ffb347; background: #13172b; }
        .actions button {
            background: #2a2e48;
            border: none;
            padding: 5px 12px;
            border-radius: 30px;
            margin: 0 5px;
            cursor: pointer;
            color: white;
        }
        .games-grid {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 25px;
            margin-bottom: 40px;
        }
        .game-card {
            background: rgba(20, 24, 40, 0.7);
            backdrop-filter: blur(8px);
            border-radius: 48px;
            padding: 30px 25px;
            width: 240px;
            text-align: center;
            cursor: pointer;
            transition: 0.3s;
            border: 1px solid rgba(255, 100, 0, 0.3);
        }
        .game-card:hover { transform: translateY(-12px); border-color: #ff8c42; box-shadow: 0 25px 40px rgba(255,100,0,0.3); }
        .players-list { display: flex; flex-direction: column; gap: 20px; }
        .player-card {
            background: linear-gradient(135deg, #151e2c, #1a2335);
            border-radius: 32px;
            display: flex;
            flex-direction: row;
            overflow: hidden;
            border: 1px solid rgba(255,140,0,0.4);
            transition: 0.25s;
        }
        .player-card:hover { transform: scale(1.01); border-color: #ffaa55; }
        .avatar { width: 130px; flex-shrink: 0; background: #0a0f1a; }
        .avatar img { width: 100%; height: 100%; object-fit: cover; }
        .info { flex: 1; padding: 18px; }
        .nickname {
            font-size: 1.6rem;
            font-weight: bold;
            color: #ffdfa5;
            display: flex;
            justify-content: space-between;
            flex-wrap: wrap;
        }
        .type-badge {
            background: #ff8c42;
            color: #1a1f2e;
            padding: 5px 15px;
            border-radius: 40px;
            font-size: 0.75rem;
        }
        .filter-bar {
            background: rgba(19, 23, 43, 0.8);
            backdrop-filter: blur(8px);
            padding: 15px 25px;
            border-radius: 60px;
            margin-bottom: 30px;
            display: flex;
            flex-wrap: wrap;
            gap: 15px;
        }
        .filter-group {
            display: flex;
            align-items: center;
            gap: 12px;
            background: #1e233c;
            padding: 5px 20px;
            border-radius: 50px;
        }
        .error-msg {
            background: #6a2a2a;
            padding: 20px;
            border-radius: 20px;
            margin: 20px 0;
            color: #ffa098;
            text-align: center;
        }
        @media (max-width: 700px) {
            .player-card { flex-direction: column; }
            .avatar { width: 100%; aspect-ratio: 1/1; }
            .filter-bar { flex-direction: column; align-items: stretch; }
        }
    </style>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
<canvas id="particlesCanvas"></canvas>
<div class="container">
    <div class="toolbar">
        <div style="font-weight: bold; font-size: 1.4rem;">🍽️ 喰种电竞 · 店长全能系统</div>
        <button id="shopOwnerBtn" class="btn">👑 店长模式</button>
    </div>
    <div id="adminPanel" class="admin-panel">
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px;">
            <h2 style="margin:0;">🛠️ 店长控制台</h2>
            <div>
                <button id="initDbBtn" class="btn" style="background:#2a5f7a;">🔄 一键初始化</button>
                <button id="backToClientBtn" class="btn-outline btn">← 返回</button>
            </div>
        </div>
        <div class="admin-tabs">
            <div class="admin-tab active" data-tab="games">🎮 游戏管理</div>
            <div class="admin-tab" data-tab="players">👥 陪玩管理</div>
            <div class="admin-tab" data-tab="filters">🔍 筛选器配置</div>
        </div>
        <div id="tabGames" class="tab-content active">
            <div class="form-row">
                <div class="form-group"><label>游戏ID</label><input type="text" id="gameId" placeholder="例: apex"></div>
                <div class="form-group"><label>游戏名称</label><input type="text" id="gameName" placeholder="例: Apex英雄"></div>
                <div class="form-group"><label>Emoji</label><input type="text" id="gameEmoji" placeholder="🪂🔫"></div>
                <div class="form-group"><label>描述</label><input type="text" id="gameDesc" placeholder="大逃杀"></div>
                <div class="form-group"><button id="addGameBtn" class="btn">➕ 添加/更新</button></div>
            </div>
            <table id="gamesTable"><thead><tr><th>ID</th><th>名称</th><th>Emoji</th><th>描述</th><th>操作</th></tr></thead><tbody></tbody></table>
        </div>
        <div id="tabPlayers" class="tab-content">
            <div class="form-row">
                <div class="form-group"><label>昵称</label><input type="text" id="pNickname"></div>
                <div class="form-group"><label>游戏</label><select id="pGameSelect"></select></div>
                <div class="form-group"><label>类型</label><select id="pType"><option value="tech">技术陪</option><option value="entertain">娱乐陪</option><option value="gourmet">喰种</option></select></div>
                <div class="form-group"><label>段位</label><input type="text" id="pRank"></div>
                <div class="form-group"><label>价格(元/小时)</label><input type="number" id="pPrice" step="5"></div>
            </div>
            <div class="form-row">
                <div class="form-group"><label>头像URL</label><input type="text" id="pAvatar" placeholder="图片链接"></div>
                <div class="form-group"><label>荣誉(,分隔)</label><input type="text" id="pHonors" placeholder="冠军🏆,MVP"></div>
                <div class="form-group"><label>擅长(,分隔)</label><input type="text" id="pSkills" placeholder="捷风,芮娜"></div>
                <div class="form-group"><label>额外统计(JSON)</label><input type="text" id="pStats" placeholder='{"kd":2.5}'></div>
                <div class="form-group"><button id="addUpdatePlayerBtn" class="btn">➕ 添加/更新</button></div>
            </div>
            <table id="playersAdminTable"><thead><tr><th>昵称</th><th>游戏</th><th>类型</th><th>段位</th><th>价格</th><th>操作</th></tr></thead><tbody></tbody></table>
        </div>
        <div id="tabFilters" class="tab-content">
            <div class="form-row">
                <div class="form-group"><label>游戏</label><select id="filterGameSelect"></select></div>
                <div class="form-group"><label>字段key</label><input type="text" id="filterKey" placeholder="例: kd"></div>
                <div class="form-group"><label>显示标签</label><input type="text" id="filterLabel" placeholder="例: 综合KD"></div>
                <div class="form-group"><label>选项(,分隔)</label><input type="text" id="filterOptions" placeholder="≥1.5,≥2.0,≥2.5"></div>
                <div class="form-group"><button id="addFilterBtn" class="btn">➕ 添加</button></div>
            </div>
            <div id="filtersList"></div>
        </div>
    </div>
    <div id="clientView">
        <div id="gamesGrid" class="games-grid">加载游戏中...</div>
        <div id="detailPanel">
            <div class="filter-bar" id="filterBar"></div>
            <div id="playersListContainer" class="players-list"></div>
        </div>
    </div>
</div>

<script>
(async function() {
    // 等待 SDK 加载
    if (!window.supabase) {
        document.getElementById('gamesGrid').innerHTML = '<div class="error-msg">❌ Supabase SDK 加载失败，请检查网络后刷新。</div>';
        return;
    }
    const SUPABASE_URL = 'https://zdsdipaqfxchpinifxtb.supabase.co';
    const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inpkc2RpcGFxZnhjaHBpbmlmeHRiIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY5NDgwMDgsImV4cCI6MjA5MjUyNDAwOH0.HZ6MxcZqrC-zo9-d-rdjPmcHgpnwF2tphRWm-zPvwFs';
    const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    let games = [], players = [], filters = {};
    let currentGameId = null;
    let isAdminUnlocked = false;
    const ADMIN_PASSWORD = "admin123";
    let editingPlayerId = null, editingGameId = null;

    // 粒子效果
    const canvas = document.getElementById('particlesCanvas');
    let ctx = canvas.getContext('2d');
    let particles = [];
    function resizeCanvas() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
    function initParticles() {
        particles = [];
        for(let i=0;i<100;i++) {
            particles.push({
                x: Math.random() * canvas.width, y: Math.random() * canvas.height,
                radius: Math.random() * 2 + 1,
                vx: (Math.random() - 0.5) * 0.5, vy: (Math.random() - 0.5) * 0.5,
                color: `rgba(255,140,0,${Math.random()*0.4+0.1})`
            });
        }
    }
    function draw() {
        if(!ctx) return;
        ctx.clearRect(0,0,canvas.width,canvas.height);
        for(let p of particles) {
            ctx.beginPath(); ctx.arc(p.x,p.y,p.radius,0,Math.PI*2);
            ctx.fillStyle = p.color; ctx.fill();
            p.x += p.vx; p.y += p.vy;
            if(p.x<0) p.x=canvas.width; if(p.x>canvas.width) p.x=0;
            if(p.y<0) p.y=canvas.height; if(p.y>canvas.height) p.y=0;
        }
        requestAnimationFrame(draw);
    }
    window.addEventListener('resize',()=>{ resizeCanvas(); initParticles(); });
    resizeCanvas(); initParticles(); draw();

    function showError(containerId, msg) {
        const el = document.getElementById(containerId);
        if(el) el.innerHTML = `<div class="error-msg">❌ ${msg}</div>`;
    }

    async function loadGames() {
        const { data, error } = await supabase.from('games').select('*');
        if(error) throw new Error(`games表查询失败: ${error.message}`);
        games = data || [];
        const grid = document.getElementById('gamesGrid');
        if(games.length === 0) {
            grid.innerHTML = '<div class="error-msg">⚠️ 暂无游戏数据，请点击“店长模式” → “一键初始化”。</div>';
        } else {
            grid.innerHTML = '';
            games.forEach(game => {
                const card = document.createElement('div');
                card.className = 'game-card';
                card.innerHTML = `<div style="font-size:3rem;">${game.emoji || '🎮'}</div><h3>${game.name}</h3><p>${game.description || ''}</p>`;
                card.onclick = () => { currentGameId = game.id; renderFilterBar(); renderPlayersList(); };
                grid.appendChild(card);
            });
        }
    }
    async function loadPlayers() {
        const { data, error } = await supabase.from('players').select('*');
        if(error) throw new Error(`players表查询失败: ${error.message}`);
        players = (data || []).map(p => ({...p, honors: p.honors?p.honors.split(','):[], skills: p.skills?p.skills.split(','):[], stats: p.stats||{}}));
        if(currentGameId) { renderFilterBar(); renderPlayersList(); }
        if(isAdminUnlocked && document.getElementById('adminPanel').style.display==='block') refreshPlayersAdminTable();
    }
    async function loadFilters() {
        const { data, error } = await supabase.from('filters').select('*');
        if(error) throw new Error(`filters表查询失败: ${error.message}`);
        filters = {};
        if(data) {
            data.forEach(f => {
                if(!filters[f.game_id]) filters[f.game_id] = [];
                const getValue = (p) => {
                    if(f.key === 'type') {
                        const typeMap = { tech:'技术陪', entertain:'娱乐陪', gourmet:'喰种' };
                        return typeMap[p.type] || p.type;
                    }
                    if(f.key === 'price_range') return p.price;
                    if(p.stats && p.stats[f.key] !== undefined) return p.stats[f.key];
                    if(p[f.key] !== undefined) return p[f.key];
                    return '';
                };
                const compare = (val, opt) => {
                    if(opt.startsWith('≥')) return parseFloat(val) >= parseFloat(opt.slice(1));
                    if(opt.startsWith('≤')) return parseFloat(val) <= parseFloat(opt.slice(1));
                    if(opt.includes('-')) { let [a,b]=opt.split('-'); let num=parseFloat(val); return num>=parseFloat(a) && num<=parseFloat(b); }
                    if(opt.endsWith('%')) {
                        let numOpt = parseFloat(opt);
                        let numVal = parseFloat(val);
                        if(opt.startsWith('≥')) return numVal >= numOpt;
                        if(opt.startsWith('≤')) return numVal <= numOpt;
                        return numVal === numOpt;
                    }
                    return String(val) === opt;
                };
                filters[f.game_id].push({ key:f.key, label:f.label, options:f.options, getValue, compare });
            });
        }
        if(currentGameId) renderFilterBar();
        if(isAdminUnlocked && document.getElementById('adminPanel').style.display==='block') refreshFiltersList();
    }

    async function loadAllData() {
        try {
            await loadGames();
            await loadPlayers();
            await loadFilters();
        } catch(err) {
            showError('gamesGrid', err.message);
        }
        if(isAdminUnlocked && document.getElementById('adminPanel').style.display==='block') {
            refreshGamesTable(); refreshPlayersAdminTable(); refreshFilterGameSelect(); refreshFiltersList();
        }
    }

    async function initDatabase() {
        if(!confirm('⚠️ 此操作会清空所有现有数据并恢复示例数据，确定吗？')) return;
        try {
            await supabase.from('filters').delete().neq('id',0);
            await supabase.from('players').delete().neq('id',0);
            await supabase.from('games').delete().neq('id','');
            const defaultGames = [
                { id:'valorant', name:'无畏契约', emoji:'🎯💥', description:'5v5 战术竞技' },
                { id:'darkdarker', name:'Dark and Darker', emoji:'⚔️🗡️', description:'硬核地牢逃生' },
                { id:'deltaforce', name:'三角洲行动', emoji:'🔫🚁', description:'战术射击' }
            ];
            await supabase.from('games').insert(defaultGames);
            const defaultPlayers = [
                { nickname:'暮欢', game_id:'valorant', type:'tech', rank:'神话2', price:85, avatar:'https://picsum.photos/id/64/200/200', honors:'ECL冠军🏆,全国大赛冠军', skills:'捷风,芮娜', stats:{kd:2.5,win_rate:65,acs:320,avg_kills:22,teach:'是'} },
                { nickname:'天黑黑', game_id:'darkdarker', type:'tech', rank:'3000分', price:80, avatar:'https://picsum.photos/id/104/200/200', honors:'', skills:'野蛮人,牧师', stats:{score:3000,class:'野蛮人'} },
                { nickname:'21', game_id:'deltaforce', type:'tech', rank:'大师', price:70, avatar:'https://picsum.photos/id/91/200/200', honors:'杭州赛区冠军🏆', skills:'狙击', stats:{avg_kills:8,kd:2.0} }
            ];
            await supabase.from('players').insert(defaultPlayers);
            const defaultFilters = [
                { game_id:'valorant', key:'type', label:'陪玩类型', options:['技术陪','娱乐陪','喰种'] },
                { game_id:'valorant', key:'price_range', label:'价格区间(元/小时)', options:['≤70','71-90','91-110','≥111'] },
                { game_id:'valorant', key:'rank', label:'段位', options:['铂金3','钻石1','钻石2','钻石3','超凡1','超凡2','超凡3','神话1','神话2','神话3','赋能'] },
                { game_id:'valorant', key:'kd', label:'综合KD', options:['≥1.5','≥1.8','≥2.0','≥2.5','≥3.0'] },
                { game_id:'valorant', key:'win_rate', label:'排位胜率', options:['≥50%','≥55%','≥60%','≥65%','≥70%'] },
                { game_id:'valorant', key:'acs', label:'场均评分(ACS)', options:['≥200','≥250','≥300','≥350','≥400'] },
                { game_id:'valorant', key:'avg_kills', label:'场均击杀', options:['≥15','≥18','≥20','≥25','≥30'] },
                { game_id:'valorant', key:'teach', label:'是否带教学', options:['是','否'] },
                { game_id:'darkdarker', key:'type', label:'陪玩类型', options:['技术陪','娱乐陪','喰种'] },
                { game_id:'darkdarker', key:'price_range', label:'价格区间(元/小时)', options:['≤70','71-90','91-110','≥111'] },
                { game_id:'darkdarker', key:'score', label:'段位分', options:['≥2200','≥2600','≥3000'] },
                { game_id:'darkdarker', key:'class', label:'职业', options:['野蛮人','牧师','游侠','法师','战士'] },
                { game_id:'deltaforce', key:'type', label:'陪玩类型', options:['技术陪','娱乐陪','喰种'] },
                { game_id:'deltaforce', key:'price_range', label:'价格区间(元/小时)', options:['≤70','71-90','91-110','≥111'] },
                { game_id:'deltaforce', key:'avg_kills', label:'场均击杀', options:['≥3','≥5','≥8','≥10','≥15'] },
                { game_id:'deltaforce', key:'kd', label:'综合KD', options:['≥1.5','≥2.0','≥2.5','≥3.0'] }
            ];
            await supabase.from('filters').insert(defaultFilters);
            await loadAllData();
            alert('✅ 初始化成功！');
        } catch(e) { alert('初始化失败: '+e.message); }
    }

    // 老板端渲染函数
    function renderFilterBar() {
        const container = document.getElementById('filterBar');
        if(!currentGameId) { container.innerHTML = ''; return; }
        const gf = filters[currentGameId] || [];
        if(gf.length===0) { container.innerHTML = '<div>暂无筛选器</div>'; return; }
        let html = '';
        gf.forEach(f => {
            html += `<div class="filter-group"><label>${f.label}</label><select id="filter_${f.key}"><option value="">全部</option>${f.options.map(opt => `<option value="${opt}">${opt}</option>`).join('')}</select></div>`;
        });
        html += `<button class="btn" id="resetFiltersBtn" style="background:#2a2e48;">重置筛选</button>`;
        container.innerHTML = html;
        gf.forEach(f => { const sel = document.getElementById(`filter_${f.key}`); if(sel) sel.onchange = () => applyFiltersAndRender(); });
        const resetBtn = document.getElementById('resetFiltersBtn');
        if(resetBtn) resetBtn.onclick = () => { gf.forEach(f=>{ const s=document.getElementById(`filter_${f.key}`); if(s) s.value=''; }); applyFiltersAndRender(); };
        applyFiltersAndRender();
    }
    function getCurrentFilterValues() {
        const vals = {};
        if(!currentGameId) return vals;
        const gf = filters[currentGameId] || [];
        gf.forEach(f => { const sel = document.getElementById(`filter_${f.key}`); if(sel && sel.value) vals[f.key]=sel.value; });
        return vals;
    }
    function filterPlayers() {
        let filtered = players.filter(p => p.game_id === currentGameId && p.is_active !== false);
        const vals = getCurrentFilterValues();
        const gf = filters[currentGameId] || [];
        for(let f of gf) {
            const selected = vals[f.key];
            if(!selected) continue;
            filtered = filtered.filter(p => f.compare(f.getValue(p), selected));
        }
        return filtered;
    }
    function renderPlayersList() {
        const container = document.getElementById('playersListContainer');
        if(!currentGameId) { container.innerHTML = '<div>请选择一个游戏</div>'; return; }
        const filtered = filterPlayers();
        if(filtered.length===0) { container.innerHTML = '<div>😭 没有符合条件的陪玩</div>'; return; }
        container.innerHTML = '';
        filtered.forEach(p => {
            const typeText = { tech:'技术陪', entertain:'娱乐陪', gourmet:'喰种' }[p.type];
            const honorsHtml = p.honors?.length ? `<div class="honor-list">${p.honors.map(h=>`<span class="honor-tag">🏅 ${escapeHtml(h)}</span>`).join('')}</div>` : '';
            const skillsHtml = p.skills?.length ? `<div class="skill-list">擅长: ${p.skills.map(s=>`<span class="skill-tag">🎮 ${escapeHtml(s)}</span>`).join('')}</div>` : '';
            const card = document.createElement('div');
            card.className = 'player-card';
            card.innerHTML = `
                <div class="avatar"><img src="${escapeHtml(p.avatar || 'https://picsum.photos/130/130')}" onerror="this.src='https://picsum.photos/130/130'"></div>
                <div class="info">
                    <div class="nickname">${escapeHtml(p.nickname)} <span class="type-badge">${typeText}</span></div>
                    <div>🏆 ${escapeHtml(p.rank)}</div>
                    <div>💰 ${p.price}元/小时</div>
                    ${honorsHtml}
                    ${skillsHtml}
                </div>
            `;
            container.appendChild(card);
        });
    }
    function applyFiltersAndRender() { renderPlayersList(); }

    // 店长管理函数（精简保留核心）
    function refreshGamesTable() {
        const tbody = document.querySelector('#gamesTable tbody');
        tbody.innerHTML = '';
        games.forEach(g => {
            const row = tbody.insertRow();
            row.insertCell(0).innerText = g.id;
            row.insertCell(1).innerText = g.name;
            row.insertCell(2).innerText = g.emoji;
            row.insertCell(3).innerText = g.description;
            const actions = row.insertCell(4);
            actions.innerHTML = `<button onclick="window.editGameCall('${g.id}')">编辑</button><button onclick="window.deleteGameCall('${g.id}')" style="background:#aa2e2e;">删除</button>`;
        });
    }
    window.editGameCall = (id) => { const g = games.find(g=>g.id===id); if(g){ document.getElementById('gameId').value=g.id; document.getElementById('gameName').value=g.name; document.getElementById('gameEmoji').value=g.emoji; document.getElementById('gameDesc').value=g.description; editingGameId=id; } };
    window.deleteGameCall = async (id) => { if(confirm('删除游戏及其所有陪玩？')){ await supabase.from('players').delete().eq('game_id',id); await supabase.from('filters').delete().eq('game_id',id); await supabase.from('games').delete().eq('id',id); await loadAllData(); } };
    document.getElementById('addGameBtn').onclick = async () => {
        let id = document.getElementById('gameId').value.trim(), name = document.getElementById('gameName').value.trim(), emoji = document.getElementById('gameEmoji').value.trim(), desc = document.getElementById('gameDesc').value.trim();
        if(!id || !name) { alert('ID和名称必填'); return; }
        if(editingGameId) { await supabase.from('games').update({ id, name, emoji, description: desc }).eq('id', editingGameId); editingGameId=null; }
        else { await supabase.from('games').insert([{ id, name, emoji, description: desc }]); }
        await loadAllData();
        document.getElementById('gameId').value=''; document.getElementById('gameName').value=''; document.getElementById('gameEmoji').value=''; document.getElementById('gameDesc').value='';
    };
    function refreshPlayersAdminTable() {
        const tbody = document.querySelector('#playersAdminTable tbody'); tbody.innerHTML='';
        players.forEach(p => {
            const gameName = games.find(g=>g.id===p.game_id)?.name || p.game_id;
            const row = tbody.insertRow();
            row.insertCell(0).innerText = p.nickname; row.insertCell(1).innerText = gameName; row.insertCell(2).innerText = { tech:'技术陪', entertain:'娱乐陪', gourmet:'喰种' }[p.type];
            row.insertCell(3).innerText = p.rank; row.insertCell(4).innerText = p.price;
            const actions = row.insertCell(5);
            actions.innerHTML = `<button onclick="window.editPlayerCall('${p.id}')">编辑</button><button onclick="window.deletePlayerCall('${p.id}')" style="background:#aa2e2e;">删除</button>`;
        });
        const gameSelect = document.getElementById('pGameSelect'); gameSelect.innerHTML='';
        games.forEach(g=>{ const opt=document.createElement('option'); opt.value=g.id; opt.text=g.name; gameSelect.appendChild(opt); });
    }
    window.editPlayerCall = (id) => { const p = players.find(p=>p.id===id); if(p){ document.getElementById('pNickname').value=p.nickname; document.getElementById('pGameSelect').value=p.game_id; document.getElementById('pType').value=p.type; document.getElementById('pRank').value=p.rank; document.getElementById('pPrice').value=p.price; document.getElementById('pAvatar').value=p.avatar||''; document.getElementById('pHonors').value=(p.honors||[]).join(','); document.getElementById('pSkills').value=(p.skills||[]).join(','); document.getElementById('pStats').value=JSON.stringify(p.stats||{}); editingPlayerId=id; } };
    window.deletePlayerCall = async (id) => { if(confirm('删除陪玩？')){ await supabase.from('players').delete().eq('id',id); await loadAllData(); } };
    document.getElementById('addUpdatePlayerBtn').onclick = async () => {
        let nickname = document.getElementById('pNickname').value.trim(), gameId = document.getElementById('pGameSelect').value, type = document.getElementById('pType').value, rank = document.getElementById('pRank').value, price = parseFloat(document.getElementById('pPrice').value), avatar = document.getElementById('pAvatar').value, honors = document.getElementById('pHonors').value.split(',').map(s=>s.trim()).filter(s=>s), skills = document.getElementById('pSkills').value.split(',').map(s=>s.trim()).filter(s=>s);
        let stats = {}; try{ stats = JSON.parse(document.getElementById('pStats').value||'{}'); }catch(e){}
        if(!nickname || !gameId || !rank || isNaN(price)){ alert('请填写完整'); return; }
        const toStore = { nickname, game_id:gameId, type, rank, price, avatar, honors:honors.join(','), skills:skills.join(','), stats };
        if(editingPlayerId){ await supabase.from('players').update(toStore).eq('id', editingPlayerId); editingPlayerId=null; }
        else{ await supabase.from('players').insert([toStore]); }
        await loadAllData();
        document.getElementById('pNickname').value=''; document.getElementById('pRank').value=''; document.getElementById('pPrice').value=''; document.getElementById('pAvatar').value=''; document.getElementById('pHonors').value=''; document.getElementById('pSkills').value=''; document.getElementById('pStats').value='';
    };
    function refreshFilterGameSelect() { const sel = document.getElementById('filterGameSelect'); sel.innerHTML=''; games.forEach(g=>{ const opt=document.createElement('option'); opt.value=g.id; opt.text=g.name; sel.appendChild(opt); }); }
    function refreshFiltersList() {
        const container = document.getElementById('filtersList'); container.innerHTML='';
        for(let gameId in filters){
            const gameName = games.find(g=>g.id===gameId)?.name || gameId;
            const div = document.createElement('div'); div.style.background='#0b0e1a'; div.style.padding='15px'; div.style.borderRadius='24px'; div.style.marginBottom='15px';
            let html = `<strong>🎮 ${gameName}</strong><ul>`;
            filters[gameId].forEach(f=>{ html += `<li>${f.label} (key: ${f.key}) 选项: ${f.options.join(', ')} <button onclick="window.deleteFilterCall('${gameId}','${f.key}')" style="background:#aa2e2e;">删除</button></li>`; });
            html += `</ul>`; div.innerHTML = html; container.appendChild(div);
        }
    }
    window.deleteFilterCall = async (gameId, key) => { await supabase.from('filters').delete().match({ game_id:gameId, key }); await loadAllData(); };
    document.getElementById('addFilterBtn').onclick = async () => {
        const gameId = document.getElementById('filterGameSelect').value, key = document.getElementById('filterKey').value.trim(), label = document.getElementById('filterLabel').value.trim(), optionsStr = document.getElementById('filterOptions').value.trim();
        if(!gameId || !key || !label || !optionsStr){ alert('请完整填写'); return; }
        const options = optionsStr.split(',').map(s=>s.trim());
        await supabase.from('filters').insert([{ game_id:gameId, key, label, options }]);
        await loadAllData();
        document.getElementById('filterKey').value=''; document.getElementById('filterLabel').value=''; document.getElementById('filterOptions').value='';
    };
    function enterAdminMode() { const pwd = prompt('请输入店长密码：'); if(pwd===ADMIN_PASSWORD){ isAdminUnlocked=true; document.getElementById('adminPanel').style.display='block'; refreshGamesTable(); refreshPlayersAdminTable(); refreshFilterGameSelect(); refreshFiltersList(); } else alert('密码错误'); }
    function exitAdminMode() { isAdminUnlocked=false; document.getElementById('adminPanel').style.display='none'; }
    document.getElementById('shopOwnerBtn').onclick = enterAdminMode;
    document.getElementById('backToClientBtn').onclick = exitAdminMode;
    document.getElementById('initDbBtn').onclick = initDatabase;
    document.querySelectorAll('.admin-tab').forEach(tab => {
        tab.onclick = () => {
            document.querySelectorAll('.admin-tab').forEach(t=>t.classList.remove('active'));
            tab.classList.add('active');
            const target = tab.dataset.tab;
            document.querySelectorAll('.tab-content').forEach(c=>c.classList.remove('active'));
            document.getElementById(`tab${target.charAt(0).toUpperCase()+target.slice(1)}`).classList.add('active');
        };
    });
    function escapeHtml(str) { return String(str).replace(/[&<>]/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;'}[m])); }
    await loadAllData();
    exitAdminMode();
})();
</script>
</body>
</html>
